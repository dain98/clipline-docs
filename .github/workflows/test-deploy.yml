name: Test deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-deploy:
    name: Test Docusaurus build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test build website
        run: npm run build
